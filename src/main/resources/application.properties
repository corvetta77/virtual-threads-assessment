server.port=8080

# ─── Virtual Threads ─────────────────────────────────────────────────────────
# Toggle this property to switch between platform threads and virtual threads.
# true  = Tomcat uses a virtual-thread-per-request executor  (VT enabled)
# false = Tomcat uses its classic fixed thread-pool           (VT disabled)
spring.threads.virtual.enabled=false

# ─── Tomcat thread pool (applies only when virtual threads are DISABLED) ─────
# Sized for 500m CPU pod: ~100x CPU millicores is the practical ceiling
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,prometheus,threaddump
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.75,0.95,0.99,0.999

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.assessment=INFO
