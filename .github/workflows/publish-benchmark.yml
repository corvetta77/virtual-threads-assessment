name: Publish Benchmark Chart

on:
  push:
    branches: [main, master]
    paths:
      - 'results/**'
      - 'scripts/aggregate-results.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate chart
        run: python3 scripts/aggregate-results.py

      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          cp results/benchmark-chart.html _site/index.html
          cp results/aggregated.json _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
